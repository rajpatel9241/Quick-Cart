<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickCart | Smart Kitchen Oil Brush</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#eef2ff,#f9fafc);
color:#222;

}

/* HEADER */

header{

text-align:center;
padding:25px;
font-size:32px;
font-weight:700;
letter-spacing:1px;

background:linear-gradient(90deg,#ff4b2b,#ff416c);
-webkit-background-clip:text;
color:transparent;

}

/* CONTAINER */

.container{

max-width:1100px;
margin:auto;
padding:20px;

}

/* PRODUCT CARD */

.product{

display:grid;
grid-template-columns:1fr 1fr;
gap:40px;

background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);

padding:35px;

border-radius:18px;

box-shadow:0 15px 40px rgba(0,0,0,0.12);

transition:0.3s;

}

.product:hover{

transform:translateY(-5px);

}

/* IMAGE */

.product img{

width:100%;
border-radius:12px;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

}

/* TITLE */

.product-title{

font-size:30px;
font-weight:700;
margin-bottom:10px;

}

/* PRICE */

.price{

font-size:28px;
font-weight:700;
color:#ff2e2e;

}

.old{

text-decoration:line-through;
color:gray;
margin-right:10px;

}

/* BADGE */

.sale-badge{

background:#ff2e2e;
color:white;

padding:6px 12px;

border-radius:6px;

display:inline-block;

font-size:14px;

margin-bottom:10px;

}

/* TIMER */

.timer{

margin:15px 0;

background:#111;
color:white;

display:inline-block;

padding:8px 14px;

border-radius:6px;

}

/* BUTTON */

.order-btn{

display:inline-block;

margin-top:15px;

background:linear-gradient(90deg,#ff416c,#ff4b2b);

color:white;

padding:15px 28px;

border-radius:30px;

font-size:18px;

text-decoration:none;

font-weight:600;

transition:0.3s;

box-shadow:0 10px 20px rgba(255,65,108,0.4);

}

.order-btn:hover{

transform:scale(1.05);

}

/* FEATURES */

.features{

margin-top:40px;

background:white;

padding:30px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

.features h2{

text-align:center;
margin-bottom:20px;

}

.features ul{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

}

.features li{

background:#f7f7f7;

padding:14px;

border-radius:8px;

}

/* TRUST */

.trust{

margin-top:30px;

text-align:center;

font-size:15px;

color:#666;

}

/* ORDER FORM */

.order-form{

margin-top:40px;

background:white;

padding:30px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

.order-form h2{

text-align:center;
margin-bottom:20px;

}

form input, form textarea{

width:100%;

padding:12px;

margin-bottom:15px;

border:1px solid #ddd;

border-radius:8px;

}

form button{

width:100%;

padding:15px;

background:linear-gradient(90deg,#ff416c,#ff4b2b);

border:none;

color:white;

font-size:18px;

border-radius:30px;

cursor:pointer;

}

/* MOBILE */

@media(max-width:768px){

.product{

grid-template-columns:1fr;

}

.features ul{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="price">

</div>

<div class="timer">

Offer Ends In: <span id="countdown"></span>

</div>

<p>

Perfect kitchen oil brush bottle. Spread oil evenly while cooking BBQ, chicken, salad or roti.

</p>

<a href="#order" class="order-btn">Order Now</a>

</div>

</section>
