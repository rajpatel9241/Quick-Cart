<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickCart | Smart Oil Brush Bottle</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
}

header{
text-align:center;
font-size:32px;
font-weight:bold;
padding:20px;
color:#ff7a00;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.product{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.main-img{
width:100%;
border-radius:10px;
}

.thumbs{
display:flex;
gap:10px;
margin-top:10px;
}

.thumbs img{
width:70px;
border-radius:6px;
cursor:pointer;
}

.price{
font-size:26px;
margin:10px 0;
}

.old{
text-decoration:line-through;
color:gray;
}

.new{
color:#ff7a00;
font-weight:bold;
}

.timer{
background:#222;
color:white;
padding:8px 14px;
display:inline-block;
border-radius:6px;
margin-top:10px;
}

.badges{
margin-top:10px;
color:#28a745;
font-weight:bold;
}

.order{
background:white;
margin-top:25px;
padding:20px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#ff7a00;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.quantity{
display:flex;
gap:10px;
align-items:center;
}

.quantity button{
width:35px;
height:35px;
}

.offer{
border:1px solid #ddd;
padding:10px;
border-radius:6px;
margin:6px 0;
}

.review{
margin-top:10px;
}

.popup{
position:fixed;
bottom:20px;
left:20px;
background:white;
padding:10px 15px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
display:none;
}

@media(max-width:768px){

.product{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>QuickCart</header>

<div class="container">

<div class="product">

<div>

<img id="mainImage" class="main-img" src="oil1.jpg.jpeg">

<div class="thumbs">

<img src="oil1.jpg.jpeg" onclick="changeImage(this)">
<img src="oil2.jpg.jpeg" onclick="changeImage(this)">
<img src="oil3.jpg.jpeg" onclick="changeImage(this)">
<img src="oil4.jpg.jpeg" onclick="changeImage(this)">

</div>

</div>

<div>

<h2>Smart Oil Brush Bottle</h2>

<div class="price">
<span class="old">₹299</span>
<span class="new">₹149</span>
</div>

<div class="timer">
Offer Ends In: <span id="countdown"></span>
</div>

<div class="badges">
🚚 Free Delivery Across India
</div>

<div class="review">
⭐⭐⭐⭐⭐ 4.8 Rating (1,200+ Customers)
</div>

</div>

</div>

<div class="order">

<h3>Place Your Order</h3>

<form action="https://formsubmit.co/rounakpatel0723@gmail.com" method="POST">

<label>Select Offer</label>

<div class="offer">
<input type="radio" name="Offer" value="1 Piece ₹149" checked>
1 Piece - ₹149
</div>

<div class="offer">
<input type="radio" name="Offer" value="2 Pieces ₹229">
2 Pieces - ₹229 (₹500 cut)
</div>

<label>Quantity</label>

<div class="quantity">

<button type="button" onclick="decrease()">-</button>

<input id="qty" name="Quantity" value="1">

<button type="button" onclick="increase()">+</button>

</div>

<input type="text" name="Name" placeholder="Full Name" required>

<input type="tel" name="Phone" placeholder="Mobile Number" required>

<input type="text" name="Street" placeholder="Street Address" required>

<input type="text" name="City" placeholder="City" required>

<select name="State">

<option>Andhra Pradesh</option>
<option>Bihar</option>
<option>Delhi</option>
<option>Gujarat</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Maharashtra</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Tamil Nadu</option>
<option>Uttar Pradesh</option>
<option>West Bengal</option>

</select>

<input type="text" name="Pincode" placeholder="Pin Code" required>

<button type="submit">Cash On Delivery</button>

</form>

<br>

<a href="upi://pay?pa=rk86319625-1@oksbi&pn=QuickCart&am=149&cu=INR">
<button>Pay Online (UPI)</button>
</a>

</div>

</div>

<div class="popup" id="popup">
🔥 Rahul from Delhi ordered 2 pieces
</div>

<script>

function changeImage(img){
document.getElementById("mainImage").src = img.src;
}

function increase(){
var qty=document.getElementById("qty");
qty.value=parseInt(qty.value)+1;
}

function decrease(){
var qty=document.getElementById("qty");
if(qty.value>1){
qty.value=parseInt(qty.value)-1;
}
}

var countDownDate=new Date().getTime()+(2*60*60*1000);

setInterval(function(){

var now=new Date().getTime();

var distance=countDownDate-now;

var h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var m=Math.floor((distance%(1000*60*60))/(1000*60));
var s=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
h+"h "+m+"m "+s+"s";

},1000);

setInterval(function(){

var popup=document.getElementById("popup");

popup.style.display="block";

setTimeout(function(){
popup.style.display="none";
},4000);

},15000);

</script>

</body>
</html>
