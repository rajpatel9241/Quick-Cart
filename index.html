<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickCart Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f7f2e9;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
}

.quick{
color:white;
}

.cart{
color:#2b7cff;
}

.container{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:100%;
border-radius:8px;
}

.old{
text-decoration:line-through;
color:gray;
}

.price{
color:red;
font-size:18px;
}

.stock{
color:red;
font-size:12px;
margin-bottom:5px;
}

button{
background:#2b7cff;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
width:100%;
margin-top:5px;
}

#cartDrawer{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

.popup{
position:fixed;
bottom:20px;
left:20px;
background:white;
padding:10px 15px;
border-radius:6px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
display:none;
font-size:13px;
}

</style>

</head>

<body>

<header>

<div class="logo">
<span class="quick">Quick</span>
<span class="cart">Cart</span>
</div>

<div onclick="toggleCart()" style="cursor:pointer">
🛒 Cart (<span id="cartCount">0</span>)
</div>

</header>

<div class="container">

<h2>Kitchen Gadgets</h2>

<div class="products">

<div class="product">
<img src="oil1.jpg">
<div class="old">₹399</div>
<div class="price">₹199</div>
<div class="stock"></div>
<button onclick="addToCart('Oil Dispenser',199)">Add to Cart</button>
</div>

<div class="product">
<img src="chopper1.jpg">
<div class="old">₹399</div>
<div class="price">₹199</div>
<div class="stock"></div>
<button onclick="addToCart('Vegetable Chopper',199)">Add to Cart</button>
</div>

<div class="product">
<img src="faucet1.jpg">
<div class="old">₹299</div>
<div class="price">₹169</div>
<div class="stock"></div>
<button onclick="addToCart('Faucet Filter',169)">Add to Cart</button>
</div>

<div class="product">
<img src="shoap1.jpg">
<div class="old">₹499</div>
<div class="price">₹249</div>
<div class="stock"></div>
<button onclick="addToCart('Soap Dispenser',249)">Add to Cart</button>
</div>

</div>


<h2>Unique Keychains</h2>

<div class="products">

<div class="product">
<img src="shord1.jpg">
<div class="old">₹399</div>
<div class="price">₹199</div>
<div class="stock"></div>
<button onclick="addToCart('Sword Keychain',199)">Add to Cart</button>
</div>

<div class="product">
<img src="gun1.jpg">
<div class="old">₹449</div>
<div class="price">₹229</div>
<div class="stock"></div>
<button onclick="addToCart('Gun Keychain',229)">Add to Cart</button>
</div>

<div class="product">
<img src="gear1.jpg">
<div class="old">₹449</div>
<div class="price">₹229</div>
<div class="stock"></div>
<button onclick="addToCart('Gear Keychain',229)">Add to Cart</button>
</div>

<div class="product">
<img src="dumble1.jpg">
<div class="old">₹449</div>
<div class="price">₹199</div>
<div class="stock"></div>
<button onclick="addToCart('Dumbbell Keychain',199)">Add to Cart</button>
</div>

</div>

</div>


<div id="cartDrawer">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="cartTotal"></h3>

<button onclick="openOrder()">Checkout</button>

<div id="orderForm" style="display:none">

<h3>Place Order</h3>

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone Number">

<input id="street" placeholder="Street Address">

<input id="city" placeholder="City">

<select id="state">

<option>Select State</option>
<option>Bihar</option>
<option>Uttar Pradesh</option>
<option>Delhi</option>
<option>Maharashtra</option>
<option>Gujarat</option>
<option>Rajasthan</option>
<option>Punjab</option>
<option>Haryana</option>
<option>Madhya Pradesh</option>
<option>West Bengal</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Tamil Nadu</option>
<option>Kerala</option>

</select>

<input id="pincode" placeholder="Pincode">

<button onclick="payUPI()">Pay Online (UPI)</button>

<button onclick="cashOrder()">Cash on Delivery</button>

</div>

</div>

<div class="popup" id="orderPopup"></div>

<script>

let cart=[]
let total=0

function toggleCart(){

let cartDrawer=document.getElementById("cartDrawer")

if(cartDrawer.style.right=="0px"){
cartDrawer.style.right="-320px"
}else{
cartDrawer.style.right="0px"
}

}

function addToCart(product,price){

cart.push(product)

total+=price

document.getElementById("cartCount").innerText=cart.length

document.getElementById("cartItems").innerHTML+=product+" - ₹"+price+"<br>"

document.getElementById("cartTotal").innerText="Total ₹"+total

}

function openOrder(){

document.getElementById("orderForm").style.display="block"

}

function payUPI(){

window.location.href="upi://pay?pa=rk86319625-1@oksbi&pn=QuickCart&cu=INR"

}

function cashOrder(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let city=document.getElementById("city").value

window.location.href="mailto:rounakpatel0723@gmail.com?subject=QuickCart Order&body=Name:"+name+" Phone:"+phone+" City:"+city

}


function randomStock(){

let stocks=document.querySelectorAll(".stock")

stocks.forEach(function(item){

let num=Math.floor(Math.random()*5)+3

item.innerText=num+" pieces left"

})

}

randomStock()


let names=["Rahul","Amit","Neha","Pooja","Ravi","Arjun","Karan"]
let cities=["Delhi","Patna","Jaipur","Mumbai","Lucknow"]

function fakeOrder(){

let name=names[Math.floor(Math.random()*names.length)]
let city=cities[Math.floor(Math.random()*cities.length)]

let popup=document.getElementById("orderPopup")

popup.innerText=name+" from "+city+" ordered a product"

popup.style.display="block"

setTimeout(()=>{

popup.style.display="none"

},4000)

}

setInterval(fakeOrder,10000)

</script>

</body>

</html>
