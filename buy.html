<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QuickCart Checkout</title>

<style>

body{
font-family:Arial;
background:#f5efe6;
margin:0;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.product{
display:flex;
gap:10px;
margin-bottom:15px;
align-items:center;
}

.product img{
width:60px;
}

.price{
color:red;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

.qty{
display:flex;
gap:5px;
margin-top:5px;
}

.qty button{
width:30px;
height:30px;
}

.total{
font-weight:bold;
margin-top:15px;
}

button.order{
width:100%;
padding:12px;
background:#2b7cff;
color:white;
border:none;
border-radius:6px;
margin-top:15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Your Order</h2>

<div id="cartItems"></div>

<div class="total">
Total ₹ <span id="totalPrice">0</span>
</div>

<h3>Delivery Details</h3>

<input placeholder="Full Name" required>

<input placeholder="Mobile Number (10 digits)" pattern="[0-9]{10}" required>

<input placeholder="Street Address">

<input placeholder="Pincode (6 digits)" pattern="[0-9]{6}">

<select>

<option>Select State</option>
<option>Bihar</option>
<option>Delhi</option>
<option>Uttar Pradesh</option>
<option>Maharashtra</option>
<option>Gujarat</option>

</select>

<select id="payment">

<option value="">Select Payment</option>
<option value="cod">Cash on Delivery</option>
<option value="upi">Online Payment (UPI)</option>

</select>

<button class="order" onclick="checkout()">

Confirm Order

</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

let container = document.getElementById("cartItems")

let total = 0

cart.forEach((p,i)=>{

let div=document.createElement("div")

div.className="product"

div.innerHTML=`

<img src="${p.img}">

<div>

<div>${p.name}</div>

<div class="price">₹${p.price}</div>

</div>

`

container.appendChild(div)

total += p.price

})

document.getElementById("totalPrice").innerText = total

function checkout(){

let payment=document.getElementById("payment").value

if(payment=="upi"){

let upi="upi://pay?pa=rk86319625-1@oksbi&pn=QuickCart&am="+total+"&cu=INR"

window.location.href=upi

setTimeout(()=>{

window.location.href="thankyou.html"

},4000)

}else{

window.location.href="thankyou.html"

}

}

</script>

</body>
</html>
