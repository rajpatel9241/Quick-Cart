<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QuickCart Checkout</title>

<style>

body{
font-family:Arial;
background:#f6f6f6;
margin:0;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:10px;
max-width:650px;
margin:auto;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.product{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.product img{
width:60px;
height:60px;
object-fit:contain;
}

.qty{
display:flex;
align-items:center;
gap:5px;
}

.qty button{
padding:3px 10px;
}

.remove{
color:red;
cursor:pointer;
font-size:13px;
}

.total{
font-size:20px;
font-weight:bold;
margin:15px 0;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button.submit{
width:100%;
padding:12px;
margin-top:15px;
background:#2b7cff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Your Order</h2>

<div id="products"></div>

<div class="total">
Total ₹ <span id="total">0</span>
</div>

<h2>Delivery Details</h2>

<form id="orderForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="phone" placeholder="Mobile Number (10 digits)" pattern="[0-9]{10}" required>

<input type="text" id="street" placeholder="Street Address" required>

<input type="text" id="address" placeholder="Address / Area / Landmark" required>

<input type="text" id="pincode" placeholder="Pincode (6 digits)" pattern="[0-9]{6}" required>

<select id="state" required>

<option value="">Select State</option>

<option>Bihar</option>
<option>Uttar Pradesh</option>
<option>Delhi</option>
<option>Maharashtra</option>
<option>Gujarat</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Haryana</option>
<option>Madhya Pradesh</option>
<option>West Bengal</option>
<option>Odisha</option>
<option>Jharkhand</option>
<option>Chhattisgarh</option>
<option>Assam</option>
<option>Kerala</option>
<option>Tamil Nadu</option>
<option>Karnataka</option>
<option>Telangana</option>
<option>Andhra Pradesh</option>
<option>Himachal Pradesh</option>
<option>Uttarakhand</option>

</select>

<select id="payment" required>

<option value="">Select Payment</option>
<option value="cod">Cash on Delivery</option>
<option value="upi">Online UPI</option>

</select>

<button class="submit" type="submit">
Confirm Order
</button>

</form>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

let list = document.getElementById("products")

function render(){

list.innerHTML=""

let total=0

cart.forEach((p,index)=>{

if(!p.qty) p.qty=1

total += p.price * p.qty

list.innerHTML += `

<div class="product">

<img src="${p.img}">

<div>

<b>${p.name}</b><br>

₹${p.price}

<div class="qty">

<button onclick="minus(${index})">-</button>

<span>${p.qty}</span>

<button onclick="plus(${index})">+</button>

</div>

<div class="remove" onclick="removeItem(${index})">
Remove
</div>

</div>

</div>

`

})

document.getElementById("total").innerText=total

}

function plus(i){

cart[i].qty++

save()

}

function minus(i){

if(cart[i].qty>1){

cart[i].qty--

save()

}

}

function removeItem(i){

cart.splice(i,1)

save()

}

function save(){

localStorage.setItem("cart",JSON.stringify(cart))

render()

}

render()

document.getElementById("orderForm").onsubmit=function(e){

e.preventDefault()

let phone=document.getElementById("phone").value
let pin=document.getElementById("pincode").value
let payment=document.getElementById("payment").value
let total=document.getElementById("total").innerText

if(phone.length!=10){

return alert("Enter valid 10 digit mobile number")

}

if(pin.length!=6){

return alert("Enter valid pincode")

}

if(payment=="upi"){

let upi="upi://pay?pa=rk86319625-1@oksbi&pn=QuickCart&am="+total+"&cu=INR"

window.location.href=upi

setTimeout(()=>{

window.location.href="thankyou.html"

},2000)

}

if(payment=="cod"){

window.location.href="thankyou.html"

}

}

</script>

</body>
</html>
