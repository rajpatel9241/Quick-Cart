<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout - QuickCart</title>

<style>

body{
font-family:Arial;
background:#f6f6f6;
margin:0;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:10px;
max-width:650px;
margin:auto;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.product{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.product img{
width:60px;
height:60px;
object-fit:contain;
}

.qty{
display:flex;
align-items:center;
gap:5px;
}

.qty button{
padding:4px 10px;
}

.remove{
color:red;
cursor:pointer;
font-size:14px;
}

.total{
font-size:20px;
font-weight:bold;
margin:20px 0;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button.submit{
width:100%;
padding:12px;
margin-top:15px;
background:#2b7cff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Your Order</h2>

<div id="productList"></div>

<div class="total">
Total ₹ <span id="total">0</span>
</div>

<h2>Delivery Details</h2>

<form action="https://formsubmit.co/rounakpatel0723@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="thankyou.html">

<input type="text" name="Full Name" placeholder="Full Name" required>

<input type="tel" name="Mobile Number" placeholder="Mobile Number (10 digits)" pattern="[0-9]{10}" required>

<input type="text" name="Street Address" placeholder="Street Address" required>

<input type="text" name="Pincode" placeholder="Pincode (6 digits)" pattern="[0-9]{6}" required>

<select name="State" required>

<option value="">Select State</option>

<option>Bihar</option>
<option>Uttar Pradesh</option>
<option>Delhi</option>
<option>Maharashtra</option>
<option>Gujarat</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Haryana</option>
<option>Madhya Pradesh</option>
<option>West Bengal</option>
<option>Odisha</option>
<option>Jharkhand</option>
<option>Chhattisgarh</option>
<option>Assam</option>
<option>Kerala</option>
<option>Tamil Nadu</option>
<option>Karnataka</option>
<option>Telangana</option>
<option>Andhra Pradesh</option>
<option>Himachal Pradesh</option>
<option>Uttarakhand</option>

</select>

<select name="Payment Method" required>

<option value="">Select Payment</option>
<option>Cash on Delivery</option>
<option>Online UPI</option>

</select>

<button class="submit" type="submit">
Confirm Order
</button>

</form>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

let list = document.getElementById("productList")

function render(){

list.innerHTML=""

let total=0

cart.forEach((p,index)=>{

if(!p.qty) p.qty=1

total += p.price * p.qty

list.innerHTML += `

<div class="product">

<img src="${p.img}">

<div>

<b>${p.name}</b><br>

₹${p.price}

<div class="qty">

<button onclick="minus(${index})">-</button>

<span>${p.qty}</span>

<button onclick="plus(${index})">+</button>

</div>

<div class="remove" onclick="removeItem(${index})">
Remove
</div>

</div>

</div>

`

})

document.getElementById("total").innerText=total

}

function plus(i){

cart[i].qty++

save()

}

function minus(i){

if(cart[i].qty>1){

cart[i].qty--

save()

}

}

function removeItem(i){

cart.splice(i,1)

save()

}

function save(){

localStorage.setItem("cart",JSON.stringify(cart))

render()

}

render()

</script>

</body>
</html>
