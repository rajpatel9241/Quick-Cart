<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Order - QuickCart</title>

<style>

body{
font-family:Arial;
background:#f5efe6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:25px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

.qtybox{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:10px;
}

.qtybox button{
width:40px;
height:35px;
font-size:18px;
cursor:pointer;
}

#qty{
width:50px;
text-align:center;
}

button.orderbtn{
width:100%;
padding:12px;
margin-top:15px;
background:#2b7cff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Order Details</h2>

<form onsubmit="return goThankyou()">

<input id="name" placeholder="Full Name" required>

<input id="phone" placeholder="Mobile Number" required>

<input id="address" placeholder="Street Address" required>

<input id="pincode" placeholder="Pincode" required>

<select required>

<option>Select State</option>
<option>Bihar</option>
<option>Delhi</option>
<option>Maharashtra</option>
<option>Uttar Pradesh</option>
<option>Gujarat</option>
<option>Punjab</option>
<option>Haryana</option>
<option>Rajasthan</option>
<option>West Bengal</option>
<option>Madhya Pradesh</option>
<option>Jharkhand</option>
<option>Odisha</option>
<option>Chhattisgarh</option>
<option>Tamil Nadu</option>
<option>Karnataka</option>
<option>Kerala</option>

</select>

<select required>

<option>Cash on Delivery</option>
<option>UPI Payment</option>

</select>

<div class="qtybox">

<button type="button" onclick="minus()">-</button>

<input id="qty" value="1" readonly>

<button type="button" onclick="plus()">+</button>

</div>

<button class="orderbtn" type="submit">

Confirm Order

</button>

</form>

</div>

<script>

function plus(){

let q=document.getElementById("qty")

q.value=parseInt(q.value)+1

}

function minus(){

let q=document.getElementById("qty")

if(q.value>1){

q.value=parseInt(q.value)-1

}

}

function goThankyou(){

let name=document.getElementById("name").value

let phone=document.getElementById("phone").value

let address=document.getElementById("address").value

if(name=="" || phone=="" || address==""){

alert("Please fill all details")

return false

}

window.location.href="thankyou.html"

return false

}

</script>

</body>

</html>
