<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QuickCart Order</title>

<style>

body{
font-family:Arial;
background:#f5efe6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:25px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

.qtybox{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:10px;
}

.qtybox button{
width:40px;
height:35px;
font-size:18px;
cursor:pointer;
}

#qty{
width:50px;
text-align:center;
}

button.orderbtn{
width:100%;
padding:12px;
margin-top:15px;
background:#2b7cff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Order Details</h2>

<form onsubmit="return placeOrder()">

<input id="name" pattern="[A-Za-z ]+" placeholder="Full Name" required>

<input id="phone" type="tel" pattern="[0-9]{10}" placeholder="Mobile Number (10 digits)" required>

<input id="address" placeholder="Street Address" required>

<input id="pincode" pattern="[0-9]{6}" placeholder="Pincode (6 digits)" required>

<select required>

<option value="">Select State</option>

<option>Bihar</option>
<option>Delhi</option>
<option>Maharashtra</option>
<option>Uttar Pradesh</option>
<option>Gujarat</option>
<option>Punjab</option>
<option>Haryana</option>
<option>Rajasthan</option>
<option>West Bengal</option>
<option>Madhya Pradesh</option>
<option>Jharkhand</option>
<option>Odisha</option>
<option>Chhattisgarh</option>
<option>Tamil Nadu</option>
<option>Karnataka</option>
<option>Kerala</option>

</select>

<select id="payment" required>

<option value="">Select Payment Method</option>

<option value="cod">Cash on Delivery</option>

<option value="upi">Online Payment (UPI)</option>

</select>

<div class="qtybox">

<button type="button" onclick="minus()">-</button>

<input id="qty" value="1" readonly>

<button type="button" onclick="plus()">+</button>

</div>

<button class="orderbtn" type="submit">

Confirm Order

</button>

</form>

</div>

<script>

function plus(){

let q=document.getElementById("qty")

q.value=parseInt(q.value)+1

}

function minus(){

let q=document.getElementById("qty")

if(q.value>1){

q.value=parseInt(q.value)-1

}

}

function placeOrder(){

let payment=document.getElementById("payment").value

let qty=parseInt(document.getElementById("qty").value)

let price=199

let total=price*qty

if(payment=="upi"){

let upi="upi://pay?pa=rk86319625-1@oksbi&pn=QuickCart&am="+total+"&cu=INR"

window.location.href=upi

setTimeout(function(){

window.location.href="thankyou.html"

},4000)

return false

}

window.location.href="thankyou.html"

return false

}

</script>

</body>

</html>
