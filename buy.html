<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Checkout - QuickCart</title>

<style>

body{
font-family:Arial;
background:#f6f6f6;
margin:0;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:10px;
max-width:600px;
margin:auto;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
}

.product{
display:flex;
gap:10px;
margin-bottom:10px;
}

.product img{
width:60px;
height:60px;
object-fit:contain;
}

.total{
font-size:20px;
font-weight:bold;
margin:15px 0;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2b7cff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>Your Order</h2>

<div id="productList"></div>

<div class="total">
Total ₹ <span id="totalPrice">0</span>
</div>

<h2>Delivery Details</h2>

<form id="orderForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="phone" placeholder="Mobile Number (10 digits)" required pattern="[0-9]{10}">

<input type="text" id="address" placeholder="Street Address" required>

<input type="text" id="pincode" placeholder="Pincode (6 digits)" required pattern="[0-9]{6}">

<select id="state" required>

<option value="">Select State</option>

<option>Bihar</option>
<option>Uttar Pradesh</option>
<option>Delhi</option>
<option>Maharashtra</option>
<option>Gujarat</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Haryana</option>
<option>Madhya Pradesh</option>
<option>West Bengal</option>
<option>Odisha</option>
<option>Jharkhand</option>
<option>Chhattisgarh</option>
<option>Assam</option>
<option>Kerala</option>
<option>Tamil Nadu</option>
<option>Karnataka</option>
<option>Telangana</option>
<option>Andhra Pradesh</option>
<option>Himachal Pradesh</option>
<option>Uttarakhand</option>

</select>

<select id="payment" required>

<option value="">Select Payment</option>
<option value="cod">Cash on Delivery</option>
<option value="upi">Online UPI</option>

</select>

<button type="submit">
Confirm Order
</button>

</form>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

let list = document.getElementById("productList")
let total = 0

cart.forEach(p=>{

list.innerHTML += `
<div class="product">
<img src="${p.img}">
<div>
<b>${p.name}</b><br>
₹${p.price}
</div>
</div>
`

total += Number(p.price)

})

document.getElementById("totalPrice").innerText = total

document.getElementById("orderForm").onsubmit=function(e){

e.preventDefault()

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let pin=document.getElementById("pincode").value
let pay=document.getElementById("payment").value

if(phone.length!=10){
alert("Enter valid 10 digit number")
return
}

if(pin.length!=6){
alert("Enter valid pincode")
return
}

if(pay=="upi"){

let upi="rk86319625-1@oksbi"

let link=`upi://pay?pa=${upi}&pn=QuickCart&am=${total}&cu=INR`

window.location.href=link

}

else{

alert("Order Confirmed")

window.location.href="thankyou.html"

}

}

</script>

</body>
</html>
