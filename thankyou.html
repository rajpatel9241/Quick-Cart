}

.box{
background:white;
width:90%;
max-width:500px;

h1{

}

.delivery{
background:#eef3ff;
padding:10px;
border-radius:8px;

}

p{

}

</style>
</head>

<body>

<div class="box">

<div class="tick">✅</div>

<h1>Thank You For Visiting QuickCart</h1>

</html>
