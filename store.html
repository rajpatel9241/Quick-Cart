<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QuickCart</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f6f1e9;
}

header{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:26px;
font-weight:bold;
}

.quick{
color:white;
}

.cart{
color:#2b7cff;
}

.timer{
color:#ff4d4d;
font-size:14px;
}

.container{
padding:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.price{
color:red;
font-size:18px;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:gray;
font-size:14px;
}

.left{
color:#ff4d4d;
font-size:13px;
}

.btn{
background:#2b7cff;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
margin-top:8px;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.form{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

input,select{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:10px;
}

</style>

</head>

<body>

<header>

<div class="logo">
<span class="quick">Quick</span>
<span class="cart">Cart</span>
</div>

<div class="timer">
Offer ends in <span id="timer">04:36:00</span>
</div>

</header>

<div class="container">

<h2>Kitchen Gadgets</h2>

<div class="grid">

<div class="card">
<img src="chopper1.jpg">
<div class="old">₹399</div>
<div class="price">₹199</div>
<div class="left" id="l1"></div>
<button class="btn" onclick="order('Chopper')">Order Now</button>
</div>

<div class="card">
<img src="faucet1.jpg">
<div class="old">₹299</div>
<div class="price">₹169</div>
<div class="left" id="l2"></div>
<button class="btn" onclick="order('Faucet')">Order Now</button>
</div>

<div class="card">
<img src="shoap1.jpg">
<div class="old">₹499</div>
<div class="price">₹249</div>
<div class="left" id="l3"></div>
<button class="btn" onclick="order('Soap Dispenser')">Order Now</button>
</div>

</div>

<h2>Unique Keychains</h2>

<div class="grid">

<div class="card">
<img src="shord1.jpg">
<div class="old">₹399</div>
<div class="price">₹199</div>
<div class="left" id="l4"></div>
<button class="btn" onclick="order('Sword Keychain')">Order Now</button>
</div>

<div class="card">
<img src="gun1.jpg">
<div class="old">₹449</div>
<div class="price">₹229</div>
<div class="left" id="l5"></div>
<button class="btn" onclick="order('Gun Keychain')">Order Now</button>
</div>

<div class="card">
<img src="gear1.jpg">
<div class="old">₹449</div>
<div class="price">₹229</div>
<div class="left" id="l6"></div>
<button class="btn" onclick="order('Gear Keychain')">Order Now</button>
</div>

<div class="card">
<img src="dumble1.jpg">
<div class="old">₹449</div>
<div class="price">₹199</div>
<div class="left" id="l7"></div>
<button class="btn" onclick="order('Dumbbell Keychain')">Order Now</button>
</div>

</div>

</div>

<div class="popup" id="popup">

<div class="form">

<h3>Order Details</h3>

<input placeholder="Name">

<input placeholder="Mobile Number">

<input placeholder="Street Address">

<input placeholder="Address">

<input placeholder="Pincode">

<select>

<option>Select State</option>
<option>Bihar</option>
<option>Delhi</option>
<option>Uttar Pradesh</option>
<option>Maharashtra</option>
<option>Punjab</option>
<option>Haryana</option>
<option>Rajasthan</option>
<option>Gujarat</option>
<option>West Bengal</option>
<option>Jharkhand</option>
<option>Madhya Pradesh</option>
<option>Tamil Nadu</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Odisha</option>
<option>Assam</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Telangana</option>

</select>

<select>
<option>Payment Method</option>
<option>Cash on Delivery</option>
<option>UPI rk86319625-1@oksbi</option>
</select>

<button class="btn" onclick="confirmOrder()">Confirm Order</button>

</div>

</div>

<script>

function order(){
document.getElementById("popup").style.display="flex"
}

function confirmOrder(){

let coins = localStorage.getItem("coins")

if(!coins){
coins=0
}

coins=parseInt(coins)+10

localStorage.setItem("coins",coins)

window.location="thankyou.html"

}

function pieces(id){

let n=Math.floor(Math.random()*7)+3

document.getElementById(id).innerText=n+" pieces left"

}

pieces("l1")
pieces("l2")
pieces("l3")
pieces("l4")
pieces("l5")
pieces("l6")
pieces("l7")

let time=16560

setInterval(function(){

let h=Math.floor(time/3600)
let m=Math.floor((time%3600)/60)
let s=time%60

document.getElementById("timer").innerText=h+":"+m+":"+s

time--

},1000)

</script>

</body>
</html>
