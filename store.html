<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickCart</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f7f2e9;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
}

.quick{color:white;}
.cart{color:#2b7cff;}

.timer{
background:#ff3c3c;
padding:5px 10px;
border-radius:6px;
margin-left:10px;
font-size:14px;
}

.container{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.price{color:red;}

.old{
text-decoration:line-through;
color:gray;
font-size:12px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
padding:20px;
overflow:auto;
}

.thumbs img{
width:60px;
margin:5px;
cursor:pointer;
}

button{
background:#2b7cff;
border:none;
color:white;
padding:10px;
margin-top:5px;
border-radius:5px;
width:100%;
}

.spin{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
display:none;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<header>

<div class="logo">
<span class="quick">Quick</span>
<span class="cart">Cart</span>

<span class="timer" id="timer"></span>

</div>

<div>
Coins: <span id="coins">0</span>
</div>

</header>


<div class="container">

<h2>Kitchen Gadgets</h2>

<div class="products">

<div class="product">
<img src="chopper1.jpg" onclick="openProduct('chopper')">
<div class="old">₹399</div>
<div class="price">₹199</div>
</div>

<div class="product">
<img src="oil1.jpg" onclick="openProduct('oil')">
<div class="old">₹399</div>
<div class="price">₹199</div>
</div>

<div class="product">
<img src="faucet1.jpg" onclick="openProduct('faucet')">
<div class="old">₹299</div>
<div class="price">₹169</div>
</div>

<div class="product">
<img src="shoap1.jpg" onclick="openProduct('soap')">
<div class="old">₹499</div>
<div class="price">₹249</div>
</div>

</div>


<h2>Unique Keychains</h2>

<div class="products">

<div class="product">
<img src="gun1.jpg" onclick="openProduct('gun')">
<div class="old">₹449</div>
<div class="price">₹229</div>
</div>

<div class="product">
<img src="gear1.jpg" onclick="openProduct('gear')">
<div class="old">₹449</div>
<div class="price">₹229</div>
</div>

<div class="product">
<img src="shord1.jpg" onclick="openProduct('sword')">
<div class="old">₹399</div>
<div class="price">₹199</div>
</div>

<div class="product">
<img src="dumble1.jpg" onclick="openProduct('dumb')">
<div class="old">₹449</div>
<div class="price">₹199</div>
</div>

</div>

</div>


<div class="popup" id="productPopup">

<img id="mainImg" style="width:100%;max-width:350px">

<div class="thumbs" id="thumbs"></div>

<button onclick="checkout()">Order Now</button>
<button onclick="addCoins()">Add to Cart</button>
<button onclick="closeProduct()">Close</button>

</div>


<div class="spin" id="spin">

<h3>Spin & Win</h3>

<button onclick="spin()">Spin</button>

<p id="spinResult"></p>

</div>


<script>

let coins=0

let products={

chopper:["chopper1.jpg","chopper2.jpg","chopper3.jpg","chopper4.jpg"],
oil:["oil1.jpg","oil2.jpg","oil3.jpg","oil4.jpg"],
faucet:["faucet1.jpg","faucet2.jpg","faucet3.jpg","faucet4.jpg"],
soap:["shoap1.jpg","shoap2.jpg","shoap3.jpg","shoap4.jpg"],

gun:["gun1.jpg","gun2.jpg","gun3.jpg"],
gear:["gear1.jpg","gear2.jpg","gear3.jpg"],
sword:["shord1.jpg","shord2.jpg","shord3.jpg"],
dumb:["dumble1.jpg","dumble2.jpg","dumble3.jpg"]

}

function openProduct(name){

let images=products[name]

document.getElementById("productPopup").style.display="block"

document.getElementById("mainImg").src=images[0]

let thumbs=""

images.forEach(function(i){

thumbs+=<img src="${i}" onclick="changeImg('${i}')">

})

document.getElementById("thumbs").innerHTML=thumbs

}

function changeImg(src){

document.getElementById("mainImg").src=src

}

function closeProduct(){

document.getElementById("productPopup").style.display="none"

}

function checkout(){

window.location.href="thankyou.html"

}

function addCoins(){

coins+=10

document.getElementById("coins").innerText=coins

}

setTimeout(function(){

document.getElementById("spin").style.display="block"

},5000)

function spin(){

let options=[15,20,25]

let result=options[Math.floor(Math.random()*options.length)]

document.getElementById("spinResult").innerText="You won "+result+"% discount"

}


let time=4*60*60+36*60

function countdown(){

let h=Math.floor(time/3600)

let m=Math.floor((time%3600)/60)

let s=time%60

document.getElementById("timer").innerText=h+"h "+m+"m "+s+"s"

time--

}

setInterval(countdown,1000)

</script>

</body>
</html>
