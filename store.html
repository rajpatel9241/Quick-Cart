<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QuickCart Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5efe6;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
}

.quick{color:white;}
.cart{color:#2b7cff;}

.cartcount{
background:red;
padding:3px 7px;
border-radius:50%;
font-size:12px;
margin-left:5px;
}

.timer{
color:#ff4444;
font-size:14px;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.main-img{
width:100%;
height:200px;
object-fit:contain;
}

.thumbs{
display:flex;
justify-content:center;
gap:5px;
margin-top:8px;
}

.thumbs img{
width:45px;
height:45px;
object-fit:contain;
border:1px solid #ddd;
cursor:pointer;
}

.old{
text-decoration:line-through;
color:gray;
}

.price{
color:red;
font-size:18px;
font-weight:bold;
}

.btn{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:6px;
cursor:pointer;
}

.cartbtn{
background:#555;
color:white;
}

.buybtn{
background:#2b7cff;
color:white;
}

</style>

</head>

<body>

<header>

<div class="logo">
<span class="quick">Quick</span>
<span class="cart">Cart</span>
<span class="cartcount" id="cartCount">0</span>
</div>

<div class="timer">
Offer Ends In <span id="timer">04:36:00</span>
</div>

</header>

<div class="container">

<div class="grid">

<!-- OIL -->

<div class="card">

<img id="oilMain" src="oil1.jpg" class="main-img">

<div class="thumbs">
<img src="oil1.jpg" onclick="changeImg('oilMain',this)">
<img src="oil2.jpg" onclick="changeImg('oilMain',this)">
<img src="oil3.jpg" onclick="changeImg('oilMain',this)">
<img src="oil4.jpg" onclick="changeImg('oilMain',this)">
</div>

<div class="old">₹299</div>
<div class="price">₹149</div>

<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="location.href='buy.html'">Buy Now</button>

</div>

<!-- CHOPPER -->

<div class="card">

<img id="chopperMain" src="chopper1.jpg" class="main-img">

<div class="thumbs">
<img src="chopper1.jpg" onclick="changeImg('chopperMain',this)">
<img src="chopper2.jpg" onclick="changeImg('chopperMain',this)">
<img src="chopper3.jpg" onclick="changeImg('chopperMain',this)">
<img src="chopper4.jpg" onclick="changeImg('chopperMain',this)">
</div>

<div class="old">₹399</div>
<div class="price">₹199</div>

<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="location.href='buy.html'">Buy Now</button>

</div>

<!-- FAUCET -->

<div class="card">

<img id="faucetMain" src="faucet1.jpg" class="main-img">

<div class="thumbs">
<img src="faucet1.jpg" onclick="changeImg('faucetMain',this)">
<img src="faucet2.jpg" onclick="changeImg('faucetMain',this)">
<img src="faucet3.jpg" onclick="changeImg('faucetMain',this)">
<img src="faucet4.jpg" onclick="changeImg('faucetMain',this)">
</div>

<div class="old">₹299</div>
<div class="price">₹169</div>

<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="location.href='buy.html'">Buy Now</button>

</div>

<!-- SOAP -->

<div class="card">

<img id="soapMain" src="shoap1.jpg" class="main-img">

<div class="thumbs">
<img src="shoap1.jpg" onclick="changeImg('soapMain',this)">
<img src="shoap2.jpg" onclick="changeImg('soapMain',this)">
<img src="shoap3.jpg" onclick="changeImg('soapMain',this)">
<img src="shoap4.jpg" onclick="changeImg('soapMain',this)">
</div>

<div class="old">₹499</div>
<div class="price">₹249</div>

<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="location.href='buy.html'">Buy Now</button>

</div>

<!-- GUN -->

<div class="card">

<img id="gunMain" src="gun1.jpg" class="main-img">

<div class="thumbs">
<img src="gun1.jpg" onclick="changeImg('gunMain',this)">
<img src="gun2.jpg" onclick="changeImg('gunMain',this)">
<img src="gun3.jpg" onclick="changeImg('gunMain',this)">
</div>

<div class="old">₹449</div>
<div class="price">₹229</div>

<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="location.href='buy.html'">Buy Now</button>

</div>

<!-- GEAR -->

<div class="card">

<img id="gearMain" src="gear1.jpg" class="main-img">

<div class="thumbs">
<img src="gear1.jpg" onclick="changeImg('gearMain',this)">
<img src="gear2.jpg" onclick="changeImg('gearMain',this)">
<img src="gear3.jpg" onclick="changeImg('gearMain',this)">
</div>

<div class="old">₹449</div>
<div class="price">₹229</div>

<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="location.href='buy.html'">Buy Now</button>

</div>

<!-- DUMBBELL -->

<div class="card">

<img id="dumbleMain" src="dumble1.jpg" class="main-img">

<div class="thumbs">
<img src="dumble1.jpg" onclick="changeImg('dumbleMain',this)">
<img src="dumble2.jpg" onclick="changeImg('dumbleMain',this)">
<img src="dumble3.jpg" onclick="changeImg('dumbleMain',this)">
</div>

<div class="old">₹449</div>
<div class="price">₹199</div>

<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="location.href='buy.html'">Buy Now</button>

</div>

</div>

</div>

<script>

function changeImg(id,el){
document.getElementById(id).src = el.src
}

let cart=0

function addCart(){
cart++
document.getElementById("cartCount").innerText=cart
}

let time = 16560

setInterval(function(){

let h=Math.floor(time/3600)
let m=Math.floor((time%3600)/60)
let s=time%60

document.getElementById("timer").innerText = h+":"+m+":"+s

time--

},1000)

</script>

</body>
</html>
