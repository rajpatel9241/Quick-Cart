<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QuickCart Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5efe6;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
}

.quick{color:white;}
.cart{color:#2b7cff;}

.carticon{
font-size:22px;
cursor:pointer;
}

.badge{
background:red;
color:white;
padding:3px 7px;
border-radius:50%;
font-size:12px;
}

.container{
padding:20px;
}

h2{
margin-top:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.main-img{
width:100%;
height:200px;
object-fit:contain;
}

.thumbs{
display:flex;
justify-content:center;
gap:5px;
margin-top:8px;
}

.thumbs img{
width:40px;
height:40px;
cursor:pointer;
}

.old{
text-decoration:line-through;
color:gray;
}

.price{
color:red;
font-size:18px;
font-weight:bold;
}

.stock{
color:#ff4444;
font-size:12px;
}

.btn{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:6px;
cursor:pointer;
}

.cartbtn{
background:#444;
color:white;
}

.buybtn{
background:#2b7cff;
color:white;
}

</style>

</head>

<body>

<header>

<div class="logo">
<span class="quick">Quick</span>
<span class="cart">Cart</span>
</div>

<div class="carticon" onclick="openCart()">

🛒 <span class="badge" id="cartCount">0</span>

</div>

</header>

<div class="container">

<h2>Kitchen Gadgets</h2>

<div class="grid">

<!-- CHOPPER -->

<div class="card">

<img id="c1" src="chopper1.jpg" class="main-img">

<div class="thumbs">

<img src="chopper1.jpg" onclick="changeImg('c1',this)">
<img src="chopper2.jpg" onclick="changeImg('c1',this)">
<img src="chopper3.jpg" onclick="changeImg('c1',this)">
<img src="chopper4.jpg" onclick="changeImg('c1',this)">

</div>

<div class="old">₹399</div>
<div class="price">₹199</div>
<div class="stock">Only 6 pieces left</div>

<button class="btn cartbtn"
onclick="addToCart('Vegetable Chopper',199,'chopper1.jpg')">
Add to Cart
</button>

<button class="btn buybtn"
onclick="buyProduct('Vegetable Chopper','chopper1.jpg',199)">
Buy Now
</button>

</div>

<!-- OIL DISPENSER -->

<div class="card">

<img id="o1" src="oil1.jpg" class="main-img">

<div class="thumbs">

<img src="oil1.jpg" onclick="changeImg('o1',this)">
<img src="oil2.jpg" onclick="changeImg('o1',this)">
<img src="oil3.jpg" onclick="changeImg('o1',this)">
<img src="oil4.jpg" onclick="changeImg('o1',this)">

</div>

<div class="old">₹299</div>
<div class="price">₹149</div>
<div class="stock">Only 8 pieces left</div>

<button class="btn cartbtn"
onclick="addToCart('Oil Dispenser',149,'oil1.jpg')">
Add to Cart
</button>

<button class="btn buybtn"
onclick="buyProduct('Oil Dispenser','oil1.jpg',149)">
Buy Now
</button>

</div>

</div>

<h2>Unique Keychains</h2>

<div class="grid">

<!-- GUN -->

<div class="card">

<img id="g1" src="gun1.jpg" class="main-img">

<div class="thumbs">

<img src="gun1.jpg" onclick="changeImg('g1',this)">
<img src="gun2.jpg" onclick="changeImg('g1',this)">
<img src="gun3.jpg" onclick="changeImg('g1',this)">

</div>

<div class="old">₹449</div>
<div class="price">₹229</div>
<div class="stock">Only 5 pieces left</div>

<button class="btn cartbtn"
onclick="addToCart('Gun Keychain',229,'gun1.jpg')">
Add to Cart
</button>

<button class="btn buybtn"
onclick="buyProduct('Gun Keychain','gun1.jpg',229)">
Buy Now
</button>

</div>

<!-- GEAR -->

<div class="card">

<img id="gear" src="gear1.jpg" class="main-img">

<div class="thumbs">

<img src="gear1.jpg" onclick="changeImg('gear',this)">
<img src="gear2.jpg" onclick="changeImg('gear',this)">

</div>

<div class="old">₹399</div>
<div class="price">₹199</div>
<div class="stock">Only 4 pieces left</div>

<button class="btn cartbtn"
onclick="addToCart('Gear Keychain',199,'gear1.jpg')">
Add to Cart
</button>

<button class="btn buybtn"
onclick="buyProduct('Gear Keychain','gear1.jpg',199)">
Buy Now
</button>

</div>

</div>

</div>

<script>

function changeImg(id,el){
document.getElementById(id).src=el.src
}

let cart=[]

function addToCart(name,price,img){

cart.push({name,price,img})

document.getElementById("cartCount").innerText=cart.length

localStorage.setItem("cart",JSON.stringify(cart))

}

function buyProduct(name,img,price){

localStorage.setItem("productName",name)
localStorage.setItem("productImg",img)
localStorage.setItem("productPrice",price)

window.location.href="buy.html"

}

function openCart(){

if(cart.length==0){

alert("Cart Empty")

return

}

let p=cart[0]

localStorage.setItem("productName",p.name)
localStorage.setItem("productImg",p.img)
localStorage.setItem("productPrice",p.price)

window.location.href="buy.html"

}

</script>

</body>
</html>
